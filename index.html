<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Architect: Ultra Edition</title>
    <style>
        :root {
            --neon: #00f2ff;
            --energy: #7000ff;
            --danger: #ff007b;
            --bg: #020617;
            --surface: rgba(15, 23, 42, 0.8);
            --text: #e2e8f0;
            --line-height: 1.8;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(112, 0, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 242, 255, 0.1) 0px, transparent 50%);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            line-height: var(--line-height);
        }

        #app {
            width: 100%;
            max-width: 550px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Courier New', monospace;
            color: var(--neon);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0, 242, 255, 0.05);
            padding: 10px 14px;
            border-radius: 50px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            gap: 10px;
        }

        .hud-left {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .music-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(0, 242, 255, 0.25);
            color: var(--neon);
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
        }

        .music-btn:hover {
            background: rgba(0, 242, 255, 0.12);
        }

        .shield-container {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .shield-layer {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0.05;
            transform: scale(0.5);
        }

        .layer-active {
            opacity: 1;
            transform: scale(1);
            border-color: var(--neon);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }

        .core {
            width: 70px;
            height: 70px;
            background: var(--surface);
            border: 2px solid var(--energy);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            z-index: 5;
            box-shadow: 0 0 20px var(--energy);
        }

        .card {
            background: var(--surface);
            border-radius: 35px;
            padding: 35px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 26px;
            margin: 0 0 20px 0;
            color: var(--neon);
            line-height: 1.2;
            font-weight: 800;
        }

        .theory-text {
            font-size: 16px;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        .theory-text b { color: #fff; border-bottom: 1px solid var(--energy); }

        .q-image-wrap {
    margin: 0 0 16px 0;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
}
.q-image {
    width: 100%;
    height: auto;         /* головне */
    max-height: 260px;    /* щоб не займала пів екрана */
    object-fit: contain;  /* замість cover */
    display: block;
}

        .opt-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .opt-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            padding: 20px;
            border-radius: 20px;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            line-height: 1.4;
        }

        .opt-btn:hover {
            background: rgba(112, 0, 255, 0.1);
            border-color: var(--energy);
            transform: translateX(5px);
        }

        #fb {
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            border-left: 6px solid;
            line-height: 1.6;
        }

        .correct { background: rgba(34, 197, 94, 0.1); border-color: #22c55e; color: #86efac; }
        .wrong { background: rgba(244, 63, 94, 0.1); border-color: #f43f5e; color: #fda4af; }

        .action-btn {
            background: linear-gradient(135deg, var(--energy), var(--neon));
            color: white;
            border: none;
            padding: 22px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3);
        }

        .action-btn:active { transform: scale(0.98); }

        .finish-badge {
            display: inline-block;
            background: rgba(0, 242, 255, 0.13);
            border: 1px solid rgba(0, 242, 255, 0.35);
            color: var(--neon);
            border-radius: 999px;
            padding: 7px 14px;
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 12px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .confetti {
            position: fixed;
            top: -12px;
            width: 10px;
            height: 14px;
            opacity: 0.95;
            z-index: 9999;
            pointer-events: none;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(110vh) rotate(720deg);
                opacity: 1;
            }
        }
    </style>

<div id="app">
    <div class="hud">
        <div class="hud-left">
            <span>Рівень: <span id="lvl">1</span>/12</span>

        </div>
        <button id="music-toggle" class="music-btn">🔊 Музика: ON</button>
    </div>

    <div class="shield-container">
        <div id="l3" class="shield-layer" style="width: 190px; height: 190px; border-width: 4px; border-style: double;"></div>
        <div id="l2" class="shield-layer" style="width: 150px; height: 150px; border-style: dashed;"></div>
        <div id="l1" class="shield-layer" style="width: 110px; height: 110px;"></div>
        <div class="core" id="core-node">🛡️</div>
    </div>

    <div class="card" id="main-content">
        <div id="view"></div>
    </div>
</div>

<script>
    let step = 0;
    let score = 0;
    let state = 'theory';

    // ===== Аудіо =====
    let audioCtx = null;
    let musicOn = true;
    let musicTimer = null;
    let masterGain = null;

    function ensureAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.24;
            masterGain.connect(audioCtx.destination);
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function makeVoice(type, freq, startAt, duration, peakGain) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(freq, startAt);

        gain.gain.setValueAtTime(0.0001, startAt);
        gain.gain.exponentialRampToValueAtTime(peakGain, startAt + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);

        osc.connect(gain).connect(masterGain);
        osc.start(startAt);
        osc.stop(startAt + duration + 0.02);
    }

    function makeNoise(startAt, duration, peakGain) {
        const bufferSize = Math.floor(audioCtx.sampleRate * duration);
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;

        const src = audioCtx.createBufferSource();
        src.buffer = buffer;

        const hp = audioCtx.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 1200;

        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.0001, startAt);
        gain.gain.exponentialRampToValueAtTime(peakGain, startAt + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);

        src.connect(hp).connect(gain).connect(masterGain);
        src.start(startAt);
        src.stop(startAt + duration + 0.01);
    }

    function setMusicButtonLabel() {
        const btn = document.getElementById('music-toggle');
        btn.innerText = musicOn ? '🔊 Музика: ON' : '🔇 Музика: OFF';
    }

    function musicStep() {
        if (!musicOn || !audioCtx) return;

        const t = audioCtx.currentTime + 0.02;
        const stepDur = 0.25;
        const cycle = 16 * stepDur;

        const arp = [261.63, 329.63, 392.00, 329.63, 293.66, 369.99, 440.00, 369.99];
        for (let i = 0; i < 16; i++) {
            const n = arp[i % arp.length];
            makeVoice('triangle', n, t + i * stepDur, 0.20, 0.015);
            if (i % 2 === 0) makeVoice('sine', n * 2, t + i * stepDur + 0.01, 0.12, 0.006);
        }

        const bass = [130.81, 146.83, 98.00, 110.00];
        for (let i = 0; i < 4; i++) {
            makeVoice('sawtooth', bass[i], t + i * 1.0, 0.60, 0.010);
        }

        makeVoice('sine', 196.00, t, cycle - 0.05, 0.004);

        musicTimer = setTimeout(musicStep, cycle * 1000);
    }

    function toggleMusic() {
        ensureAudio();
        musicOn = !musicOn;
        setMusicButtonLabel();

        if (musicOn) {
            if (musicTimer) clearTimeout(musicTimer);
            musicStep();
        } else if (musicTimer) {
            clearTimeout(musicTimer);
            musicTimer = null;
        }
    }

    function initMusicAutostart() {
        setMusicButtonLabel();

        try {
            ensureAudio();
            if (musicOn) musicStep();
        } catch (_) {}

        const unlock = () => {
            if (!musicOn) return;
            ensureAudio();
            if (!musicTimer) musicStep();
            document.removeEventListener('pointerdown', unlock);
            document.removeEventListener('keydown', unlock);
        };

        document.addEventListener('pointerdown', unlock, { once: true });
        document.addEventListener('keydown', unlock, { once: true });
    }

    function playCorrectSfx() {
        if (!audioCtx) return;
        const t = audioCtx.currentTime + 0.01;
        makeVoice('square', 523.25, t, 0.14, 0.03);
        makeVoice('square', 659.25, t + 0.12, 0.16, 0.03);
        makeVoice('square', 783.99, t + 0.24, 0.22, 0.035);
        makeNoise(t + 0.10, 0.10, 0.004);
    }

    function playWrongSfx() {
        if (!audioCtx) return;
        const t = audioCtx.currentTime + 0.01;
        makeVoice('sawtooth', 220.00, t, 0.16, 0.03);
        makeVoice('sawtooth', 174.61, t + 0.12, 0.20, 0.03);
        makeVoice('triangle', 130.81, t + 0.24, 0.26, 0.028);
    }

    function playFinishJingle() {
        if (!audioCtx) return;
        const t = audioCtx.currentTime + 0.02;
        makeVoice('square', 392.00, t, 0.20, 0.03);
        makeVoice('square', 523.25, t + 0.22, 0.22, 0.03);
        makeVoice('square', 659.25, t + 0.48, 0.26, 0.032);
        makeVoice('triangle', 783.99, t + 0.78, 0.35, 0.028);
    }

    function launchConfetti() {
        const colors = ['#00f2ff', '#7000ff', '#ff007b', '#22c55e', '#facc15', '#ffffff'];
        const count = 140;

        for (let i = 0; i < count; i++) {
            const el = document.createElement('div');
            el.className = 'confetti';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.background = colors[Math.floor(Math.random() * colors.length)];
            el.style.transform = `translateY(0) rotate(${Math.random() * 360}deg)`;
            el.style.animationDuration = (2.2 + Math.random() * 1.8) + 's';
            el.style.animationDelay = (Math.random() * 0.4) + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4500);
        }
    }

                { text: "Взяти своє ім'я та додати рік народження і знак '!'", p: 0, f: "Це перше, що перевірить програма хакера. Дуже слабкий захист." },
                { text: "Використати 4-5 випадкових українських слів через дефіс", p: 9, f: "Блискуче! Це називається методом фраз-паролів. Довжина б’є будь-який перебір." },
                { text: "Записати англійське слово, замінивши 's' на '$' і 'o' на '0'", p: 3, f: "Це стара техніка. Сучасні словники хакерів вже містять усі такі заміни." }

        },
        {
            t: "Привиди в Мережі",
            img: "q2-wifi-cafe.jpg",
            info: "Коли ти підключаєшся до відкритого Wi-Fi, твій телефон починає 'кричати' дані в повітря. <br><br>Зловмисник може провести атаку <b>Evil Twin</b>: створити мережу з такою ж назвою, як у кафе. Весь твій трафік пройде через його ноутбук, і він побачить твої сесії в соцмережах.",
            q: "Як захиститися, якщо терміново потрібен інтернет у публічному місці?",
            opts: [
                { text: "Роздати інтернет з власного смартфона (Мобільний хот-спот)", p: 9, f: "Мобільний інтернет зазвичай безпечніший, бо трафік зашифрований і прив’язаний до SIM-карти, тому його складніше перехопити. Публічний Wi-Fi часто відкритий або слабо захищений, і через нього зловмисники можуть перехоплювати дані або створювати підробні точки доступу." },

            q: "Тобі дзвонить 'банк' і каже, що з картки прямо зараз крадуть гроші. Твої дії?",

            q: "Чому розробники випускають оновлення так часто?",
            opts: [
                { text: "Щоб програма займала більше місця на пристрої", p: 0, f: "Це побічний ефект, а не мета розробників." },
                { text: "Щоб змінити дизайн і додати нову рекламу", p: 2, f: "Буває й таке, але головна причина — технічна стабільність та безпека." },
                { text: "Щоб закрити 'дірки' в коді, які можуть використати хакери", p: 8, f: "Вірно! Це гонка озброєнь за безпеку твоїх даних." }
            ]
        },
        {
            t: "Економіка Даних",
            img: "q9-permissions.jpg",
            info: "Багато безкоштовних сервісів заробляють не на оплаті, а на даних користувачів. Додатки можуть збирати інформацію про твою активність, вподобання та використання сервісу.\n\nЧастина цих даних збирається через дозволи, які ти надаєш при встановленні або використанні додатку (наприклад, доступ до камери, мікрофона, контактів або геолокації). Небезпека з’являється тоді, коли додаток запитує доступи, які не потрібні для його роботи.",
            q: "На що варто звернути увагу при встановленні нової гри?",
            opts: [
                { text: "На список дозволів, які вимагає програма", p: 8, f: "Так! Якщо гра просить доступ до мікрофона без причини — це підозріло." },
                { text: "На те, скільки зірок у неї в магазині", p: 2, f: "Відгуки можна підробити. Зірки не є надійним показником безпеки." },
                { text: "На розмір файлу гри", p: 0, f: "Розмір ніяк не вказує на наявність чи відсутність шпигунських модулів." }

            q: "Що НЕ варто надсилати через месенджери і чому?",
            opts: [
                { text: "Звичайні повідомлення друзям", p: 3, f: "Це нормально і не становить ризику." },
                { text: "Паролі та коди з SMS, бо вони дають повний доступ до акаунтів", p: 8, f: "Так. Якщо їх отримають інші — можуть зайти у твої акаунти." },
                { text: "Фото", p: 0, f: "Можна, але важливо думати про приватність зображення." }
            ]
        },
        {
            t: "Резервний Щит",
            img: "q11-backup.png",
            info: "Резервна копія — це дубль твоїх важливих файлів (фото, документи, проєкти), який потрібен, якщо щось зламається, зникне або буде атаковано вірусом.\n\nНайбезпечніший підхід — зберігати копії окремо від основного пристрою: наприклад, у хмарному сховищі або на зовнішньому диску, який не постійно підключений до комп’ютера.",

            opts: [
                { text: "В окремій папці на тому ж самому диску 'D:'", p: 0, f: "Це марно. Віруси-шифрувальники знищують дані на всіх дисках комп'ютера." },
                { text: "Просто зберігати всі фото в пам'яті телефону", p: 2, f: "Телефон можна загубити або він може зламатися разом із даними." },
                { text: "На окремому диску, який відключається від ПК після копіювання", p: 8, f: "Ідеально. Якщо вірус вразить ПК, він не зможе дістатися до відключеного диска." }
            ]
        },
        {
            t: "Кінцева Точка: Фізика",
            img: "q12-usb-risk.jpeg",
            info: "Всі твої цифрові замки марні, якщо хакер має фізичний доступ. <br><br>Існують USB-пристрої (BadUSB), які при підключенні розпізнаються системою як клавіатура. Вони вводять команди зі швидкістю 1000 слів на хвилину, зламуючи комп'ютер за мить.",
            q: "Чому небезпечно заряджати телефон від невідомих USB-портів у вокзалах?",
            opts: [
                { text: "Порт може бути налаштований на передачу даних, а не тільки живлення", p: 8, f: "Вірно! Це називається 'Juice Jacking'. Використовуйте свій блок живлення." },
                { text: "Через такий порт телефон буде заряджатися занадто повільно", p: 1, f: "Це дрібниця у порівнянні з ризиком крадіжки всіх твоїх фото." },
                { text: "Це може зіпсувати батарею смартфона", p: 2, f: "Такий ризик є, але безпека даних — набагато серйозніша проблема." }
            ]
        }
    ];

    function updateHUD() {
        score = Math.max(0, Math.min(100, score));

        document.getElementById('perc').innerText = score;
        document.getElementById('lvl').innerText = Math.min(step + 1, db.length);

        document.getElementById('l1').classList.toggle('layer-active', score >= 33);
        document.getElementById('l2').classList.toggle('layer-active', score >= 66);
        document.getElementById('l3').classList.toggle('layer-active', score >= 95);

        const core = document.getElementById('core-node');
        if (score >= 90) core.innerText = "💻";
        else if (score >= 50) core.innerText = "💻️";
        else core.innerText = "💻";
    }

    function render() {
        const view = document.getElementById('view');
        const data = db[step];

        if (state === 'theory') {
            view.innerHTML = `
                <h2>${data.t}</h2>
                ${data.img ? `<div class="q-image-wrap"><img class="q-image" src="${data.img}" alt="Ілюстрація теми"></div>` : ''}
                <div class="theory-text">${data.info}</div>
                <button class="action-btn" style="width:100%" onclick="startQuestion()">Увійти в симуляцію</button>
            `;
        } else {
            view.innerHTML = `
                <p style="font-size:12px; color:var(--neon); margin-bottom:10px; letter-spacing:1px">Ухвали рішення:</p>
                ${data.img ? `<div class="q-image-wrap"><img class="q-image" src="${data.img}" alt="Ілюстрація питання"></div>` : ''}
                <h2>${data.q}</h2>
                <div class="opt-list" id="opts"></div>
                <div id="fb" style="display:none"></div>
                <button id="next" class="action-btn" style="display:none; width:100%" onclick="next()">Наступний рівень</button>
            `;

            data.opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                b.innerText = o.text;
                b.onclick = () => {
                    ensureAudio();

                    score += o.p;
                    updateHUD();

                    document.getElementById('opts').style.display = 'none';
                    const f = document.getElementById('fb');
                    const isCorrect = o.p > 5;
                    f.className = isCorrect ? 'correct' : 'wrong';
                    f.innerHTML = `<b>${isCorrect ? 'СТАТУС: ЗАХИЩЕНО' : 'СТАТУС: ВРАЗЛИВО'}</b><br>${o.f}`;
                    f.style.display = 'block';
                    document.getElementById('next').style.display = 'block';

                    if (isCorrect) playCorrectSfx();
                    else playWrongSfx();
                };
                document.getElementById('opts').appendChild(b);
            });
        }
    }

    function startQuestion() {
        ensureAudio();
        state = 'q';
        render();
    }

    function restartQuiz() {
        if (musicTimer) {
            clearTimeout(musicTimer);
            musicTimer = null;
        }

        step = 0;
        score = 0;
        state = 'theory';

        document.getElementById('main-content').innerHTML = `<div id="view"></div>`;

        if (musicOn) {
            ensureAudio();
            musicStep();
        }

        updateHUD();
        render();
    }

    function next() {
        ensureAudio();
        step++;

        if (step >= db.length) {
            playFinishJingle();

            const success = score >= 70;
            if (success) launchConfetti();

            document.getElementById('main-content').innerHTML = `
                <div style="text-align:center; padding:20px">
                    <div class="finish-badge">Тест завершено</div>
                    <h2 style="font-size:32px; margin-bottom:10px">MISSION COMPLETE</h2>
                    <div style="font-size:80px; margin:30px; filter: drop-shadow(0 0 20px var(--neon))">💎</div>
                    <p style="font-size:19px; font-weight:700; margin:0 0 10px 0;">
                        ${success ? '✅ Ви пройшли всі рівні. Тест завершено успішно.' : '✅ Ви пройшли всі рівні. Тест завершено.'}
                    </p>
                    <p style="font-size:18px">Коефіцієнт захисту: <b style="color:var(--neon)">${score}%</b></p>
                    <p style="color:#94a3b8; font-size:15px; margin-top:20px">Ви побудували цифрову фортецю, яку майже неможливо зламати. Знання та критичне мислення — це ваш найкращий антивірус.</p>
                    <button class="action-btn" onclick="restartQuiz()" style="width:100%; margin-top:30px">Пройти тест ще раз</button>
                </div>
            `;
            updateHUD();
        } else {
            state = 'theory';
            render();
            updateHUD();
        }
    }

    document.getElementById('music-toggle').addEventListener('click', () => {
        toggleMusic();
    });

    initMusicAutostart();
    updateHUD();
    render();
</script>
