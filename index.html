<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cyber Architect: Ultra Edition</title>
  <style>
    :root {
      --neon: #00f2ff;
      --energy: #7000ff;
      --danger: #ff007b;
      --bg: #020617;
      --surface: rgba(15, 23, 42, 0.8);
      --text: #e2e8f0;
      --line-height: 1.8;
    }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(at 0% 0%, rgba(112, 0, 255, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(0, 242, 255, 0.1) 0px, transparent 50%);
      color: var(--text);
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      line-height: var(--line-height);
    }

    #app {
      width: 100%;
      max-width: 550px;
      padding: 25px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: "Courier New", monospace;
      color: var(--neon);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: rgba(0, 242, 255, 0.05);
      padding: 10px 14px;
      border-radius: 50px;
      border: 1px solid rgba(0, 242, 255, 0.1);
      gap: 10px;
    }

    .hud-left {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .music-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(0, 242, 255, 0.25);
      color: var(--neon);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
    }

    .shield-container {
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .shield-layer {
      position: absolute;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      opacity: 0.05;
      transform: scale(0.5);
    }

    .layer-active {
      opacity: 1;
      transform: scale(1);
      border-color: var(--neon);
      box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
    }

    .core {
      width: 70px;
      height: 70px;
      background: var(--surface);
      border: 2px solid var(--energy);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      z-index: 5;
      box-shadow: 0 0 20px var(--energy);
    }

    .card {
      background: var(--surface);
      border-radius: 35px;
      padding: 35px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      font-size: 26px;
      margin: 0 0 20px 0;
      color: var(--neon);
      line-height: 1.2;
      font-weight: 800;
    }

    .theory-text {
      font-size: 16px;
      color: #cbd5e1;
      margin-bottom: 25px;
    }

    .q-image-wrap {
      margin: 0 0 16px 0;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    .q-image {
      width: 100%;
      height: auto;
      max-height: 260px;
      object-fit: contain;
      display: block;
    }

    .opt-list { display: flex; flex-direction: column; gap: 15px; }

    .opt-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f1f5f9;
      padding: 20px;
      border-radius: 20px;
      text-align: left;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s;
      line-height: 1.4;
    }

    .opt-btn:hover {
      background: rgba(112, 0, 255, 0.1);
      border-color: var(--energy);
      transform: translateX(5px);
    }

    #fb {
      padding: 25px;
      border-radius: 20px;
      margin-bottom: 20px;
      border-left: 6px solid;
      line-height: 1.6;
    }

    .correct { background: rgba(34, 197, 94, 0.1); border-color: #22c55e; color: #86efac; }
    .wrong { background: rgba(244, 63, 94, 0.1); border-color: #f43f5e; color: #fda4af; }

    .action-btn {
      background: linear-gradient(135deg, var(--energy), var(--neon));
      color: white;
      border: none;
      padding: 22px;
      border-radius: 20px;
      font-weight: 900;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3);
    }

    .finish-badge {
      display: inline-block;
      background: rgba(0, 242, 255, 0.13);
      border: 1px solid rgba(0, 242, 255, 0.35);
      color: var(--neon);
      border-radius: 999px;
      padding: 7px 14px;
      font-weight: 700;
      letter-spacing: 1px;
      font-size: 12px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .confetti {
      position: fixed;
      top: -12px;
      width: 10px;
      height: 14px;
      opacity: 0.95;
      z-index: 9999;
      pointer-events: none;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="hud">
      <div class="hud-left">
        <span>Рівень: <span id="lvl">1</span>/12</span>
        <span>Захист: <span id="perc">0</span>%</span>
      </div>
      <button id="music-toggle" class="music-btn">🔊 Музика: ON</button>
    </div>

    <div class="shield-container">
      <div id="l3" class="shield-layer" style="width: 190px; height: 190px; border-width: 4px; border-style: double;"></div>
      <div id="l2" class="shield-layer" style="width: 150px; height: 150px; border-style: dashed;"></div>
      <div id="l1" class="shield-layer" style="width: 110px; height: 110px;"></div>
      <div class="core" id="core-node">🛡️</div>
    </div>

    <div class="card" id="main-content">
      <div id="view"></div>
    </div>
  </div>

  <!-- Фонова музика: лишаємо твою -->
  <audio id="bgm" loop playsinline preload="auto">
    <source src="the_mountain-control-system-142290.mp3" type="audio/mpeg" />
  </audio>

  <!-- SFX -->
  <audio id="sfx-correct" playsinline preload="auto">
    <source src="sfx-correct.mp3" type="audio/mpeg" />
  </audio>
  <audio id="sfx-wrong" playsinline preload="auto">
    <source src="sfx-wrong.mp3" type="audio/mpeg" />
  </audio>
  <audio id="sfx-confetti" playsinline preload="auto">
    <source src="sfx-confetti.mp3" type="audio/mpeg" />
  </audio>

  <script>
    let step = 0;
    let score = 0;
    let state = "theory";

    const bgm = document.getElementById("bgm");
    const sfxCorrect = document.getElementById("sfx-correct");
    const sfxWrong = document.getElementById("sfx-wrong");
    const sfxConfetti = document.getElementById("sfx-confetti");
    let musicOn = true;

    function setMusicButtonLabel() {
      const btn = document.getElementById("music-toggle");
      if (!btn) return;
      btn.innerText = musicOn ? "🔊 Музика: ON" : "🔇 Музика: OFF";
    }

    async function startMusic() {
      if (!musicOn || !bgm) return;
      try {
        bgm.muted = false;
        bgm.volume = 0.55;
        await bgm.play();
      } catch (_) {}
    }

    function stopMusic() {
      if (!bgm) return;
      bgm.pause();
    }

    function toggleMusic() {
      musicOn = !musicOn;
      setMusicButtonLabel();
      if (musicOn) startMusic();
      else stopMusic();
    }

    function playSfx(audioEl, volume = 0.95) {
      if (!audioEl) return;
      try {
        audioEl.pause();
        audioEl.currentTime = 0;
        audioEl.volume = volume;
        audioEl.play().catch(() => {});
      } catch (_) {}
    }

    function playCorrectSfx() { playSfx(sfxCorrect, 0.95); }
    function playWrongSfx() { playSfx(sfxWrong, 0.95); }
    function playConfettiSfx() { playSfx(sfxConfetti, 0.95); }

    function initMusicAutostart() {
      setMusicButtonLabel();
      startMusic();

      const unlock = async () => {
        await startMusic();
        document.removeEventListener("touchstart", unlock);
        document.removeEventListener("pointerdown", unlock);
        document.removeEventListener("click", unlock);
        document.removeEventListener("keydown", unlock);
      };

      document.addEventListener("touchstart", unlock, { once: true, passive: true });
      document.addEventListener("pointerdown", unlock, { once: true });
      document.addEventListener("click", unlock, { once: true });
      document.addEventListener("keydown", unlock, { once: true });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) stopMusic();
        else if (musicOn) startMusic();
      });

      window.addEventListener("pagehide", stopMusic);
      window.addEventListener("beforeunload", stopMusic);
      window.addEventListener("blur", stopMusic);
      window.addEventListener("pageshow", () => {
        if (!document.hidden && musicOn) startMusic();
      });
    }

    function launchConfetti() {
      const colors = ["#00f2ff", "#7000ff", "#ff007b", "#22c55e", "#facc15", "#ffffff"];
      for (let i = 0; i < 140; i++) {
        const el = document.createElement("div");
        el.className = "confetti";
        el.style.left = Math.random() * 100 + "vw";
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.transform = `translateY(0) rotate(${Math.random() * 360}deg)`;
        el.style.animationDuration = (2.2 + Math.random() * 1.8) + "s";
        el.style.animationDelay = (Math.random() * 0.4) + "s";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4500);
      }
    }

    const db = [
      { t: "Математика Пароля", img: "q1.jpg", info: "Надійність пароля залежить від того, скільки різних варіантів потрібно перебрати, щоб його вгадати: чим довший пароль, тим більше варіантів і тим важче його зламати. Додавати різні символи корисно, але саме довжина дає найбільший захист.", q: "Який пароль є найбільш надійним?", opts: [
        { text: "Взяти своє ім'я та додати рік народження і знак '!'", p: 0, f: "Це перше, що перевірить програма хакера. Дуже слабкий захист." },
        { text: "Використати 4-5 випадкових українських слів через дефіс", p: 9, f: "Блискуче! Метод фраз-паролів працює." },
        { text: "Записати англійське слово, замінивши 's' на '$' і 'o' на '0'", p: 3, f: "Стара техніка, її давно враховують словники." }
      ]},
      { t: "Привиди в Мережі", img: "q2-wifi-cafe.jpg", info: "Публічний Wi‑Fi може бути підробним (Evil Twin), трафік легко перехопити.", q: "Як захиститися в публічному місці?", opts: [
        { text: "Роздати інтернет зі смартфона", p: 9, f: "Найбезпечніший варіант у більшості випадків." },
        { text: "Підключитися до Wi‑Fi, але не вводити номер", p: 2, f: "Це не захистить трафік." },
        { text: "Тільки читати новини", p: 5, f: "Краще, але фонова синхронізація все одно ризик." }
      ]},
      { t: "Метадані: Сліди, які ми не бачимо", img: "q3-exif-geo.png", info: "EXIF може містити геолокацію фото.", q: "Головна небезпека оригінальних фото?", opts: [
        { text: "Фото використають для мемів", p: 1, f: "Неприємно, але не головний ризик безпеки." },
        { text: "Погіршиться якість", p: 0, f: "Це не про кібербезпеку." },
        { text: "Злочинці дізнаються місце проживання через геотеги", p: 9, f: "Так, це критичний ризик приватності." }
      ]},
      { t: "Мистецтво Фішингу", img: "q4-phishing-mail.png", info: "Фішинг тисне на емоції та змушує перейти на підробний сайт.", q: "Що перевірити в листі від 'адміністрації'?", opts: [
        { text: "Реальну адресу відправника і домен", p: 9, f: "Правильно, це головна перевірка." },
        { text: "Наявність логотипа", p: 0, f: "Логотип легко підробити." },
        { text: "Ввічливість звертання", p: 1, f: "Шахраї теж можуть бути ввічливими." }
      ]},
      { t: "Троянські Коні Сучасності", img: "q5-trojan-app.png", info: "Неліцензійні інсталятори часто несуть шкідливий код.", q: "Чому антивірус інколи мовчить?", opts: [
        { text: "Бо зламані ігри не віруси", p: -5, f: "Ні, часто саме з них і починається зараження." },
        { text: "Антивірус ігнорує ігри", p: 0, f: "Це міф." },
        { text: "Шкідливий код маскують, щоб обійти сигнатури", p: 8, f: "Так, це постійна гонка між зловмисниками й захистом." }
      ]},
      { t: "Двофакторний захист (2FA)", img: "q6-2fa.png", info: "2FA додає другий фактор входу.", q: "Що найменш безпечне?", opts: [
        { text: "SMS-повідомлення", p: 9, f: "Так, SIM-swap і перехоплення можливі." },
        { text: "Фізичний ключ", p: 0, f: "Це один із найнадійніших варіантів." },
        { text: "Код у додатку", p: 0, f: "Зазвичай безпечніше за SMS." }
      ]},
      { t: "Людина — найслабша ланка", img: "q7-bank-call.png", info: "Соціальна інженерія часто працює через телефон.", q: "Дзвінок 'з банку' про крадіжку коштів?", opts: [
        { text: "Швидко назвати код", p: -10, f: "Ні, так ви самі підтвердите шахрайську операцію." },
        { text: "Покласти слухавку і передзвонити на офіційний номер", p: 9, f: "Ідеальна дія." },
        { text: "Сперечатися з шахраєм", p: 2, f: "Краще одразу перервати розмову." }
      ]},
      { t: "Цифрова Гігієна ПЗ", img: "q8-security-update.jpg", info: "Оновлення закривають вразливості.", q: "Чому оновлення виходять часто?", opts: [
        { text: "Щоб займало більше місця", p: 0, f: "Не основна причина." },
        { text: "Щоб змінити дизайн", p: 2, f: "Іноді, але головне — безпека." },
        { text: "Щоб закрити дірки в коді", p: 8, f: "Саме так." }
      ]},
      { t: "Економіка Даних", img: "q9-permissions.jpg", info: "Дозволи застосунку можуть розкрити зайві дані.", q: "На що дивитись при встановленні гри?", opts: [
        { text: "На список дозволів", p: 8, f: "Правильно." },
        { text: "На рейтинг", p: 2, f: "Рейтинг можна накрутити." },
        { text: "На розмір файлу", p: 0, f: "Це не індикатор безпеки." }
      ]},
      { t: "Безпека в чатах", img: "q10-chat-security.png", info: "Коди й паролі не можна надсилати у месенджерах.", q: "Що НЕ варто надсилати?", opts: [
        { text: "Звичайні повідомлення", p: 3, f: "Це ок." },
        { text: "Паролі та коди з SMS", p: 8, f: "Так, це дає доступ до акаунтів." },
        { text: "Фото", p: 0, f: "Можна, але думайте про приватність." }
      ]},
      { t: "Резервний Щит", img: "q11-backup.png", info: "Бекапи мають зберігатися окремо від основного пристрою.", q: "Як правильно зберігати бекапи?", opts: [
        { text: "В папці на тому ж диску", p: 0, f: "Шифрувальник вразить і цей диск." },
        { text: "Тільки в пам'яті телефону", p: 2, f: "Телефон можна втратити." },
        { text: "На окремому диску, який відключається", p: 8, f: "Найкраща практика." }
      ]},
      { t: "Кінцева Точка: Фізика", img: "q12-usb-risk.jpeg", info: "Невідомі USB-порти можуть передавати дані, не лише живлення.", q: "Чому небезпечно заряджати телефон від невідомого USB?", opts: [
        { text: "Порт може передавати дані", p: 8, f: "Так, це Juice Jacking." },
        { text: "Повільна зарядка", p: 1, f: "Це не головний ризик." },
        { text: "Псує батарею", p: 2, f: "Може бути, але загроза даним серйозніша." }
      ]}
    ];

    function updateHUD() {
      score = Math.max(0, Math.min(100, score));
      document.getElementById("perc").innerText = score;
      document.getElementById("lvl").innerText = Math.min(step + 1, db.length);

      document.getElementById("l1").classList.toggle("layer-active", score >= 33);
      document.getElementById("l2").classList.toggle("layer-active", score >= 66);
      document.getElementById("l3").classList.toggle("layer-active", score >= 95);

      const core = document.getElementById("core-node");
      if (score >= 90) core.innerText = "💠";
      else if (score >= 50) core.innerText = "🛡️";
      else core.innerText = "💻";
    }

    function render() {
      const view = document.getElementById("view");
      const data = db[step];

      if (state === "theory") {
        view.innerHTML = `
          <h2>${data.t}</h2>
          ${data.img ? `<div class="q-image-wrap"><img class="q-image" src="${data.img}" alt="Ілюстрація"></div>` : ""}
          <div class="theory-text">${data.info}</div>
          <button class="action-btn" style="width:100%" onclick="startQuestion()">Увійти в симуляцію</button>
        `;
      } else {
        view.innerHTML = `
          <p style="font-size:12px; color:var(--neon); margin-bottom:10px; letter-spacing:1px">Ухвали рішення:</p>
          ${data.img ? `<div class="q-image-wrap"><img class="q-image" src="${data.img}" alt="Ілюстрація питання"></div>` : ""}
          <h2>${data.q}</h2>
          <div class="opt-list" id="opts"></div>
          <div id="fb" style="display:none"></div>
          <button id="next" class="action-btn" style="display:none; width:100%" onclick="next()">Наступний рівень</button>
        `;

        data.opts.forEach(o => {
          const b = document.createElement("button");
          b.className = "opt-btn";
          b.innerText = o.text;
          b.onclick = () => {
            score += o.p;
            updateHUD();

            document.getElementById("opts").style.display = "none";
            const f = document.getElementById("fb");
            const isCorrect = o.p > 5;
            f.className = isCorrect ? "correct" : "wrong";
            f.innerHTML = `<b>${isCorrect ? "СТАТУС: ЗАХИЩЕНО" : "СТАТУС: ВРАЗЛИВО"}</b><br>${o.f}`;
            f.style.display = "block";
            document.getElementById("next").style.display = "block";

            if (isCorrect) playCorrectSfx();
            else playWrongSfx();
          };
          document.getElementById("opts").appendChild(b);
        });
      }
    }

    function startQuestion() {
      state = "q";
      render();
    }

    function restartQuiz() {
      step = 0;
      score = 0;
      state = "theory";
      document.getElementById("main-content").innerHTML = `<div id="view"></div>`;
      if (musicOn) startMusic();
      updateHUD();
      render();
    }

    function getResultMeta(currentScore) {
      if (currentScore >= 85) return { title: "Кібермайстер", message: "Ви побудували дуже надійну цифрову фортецю.", emoji: "💎" };
      if (currentScore >= 70) return { title: "Сильний захист", message: "Тест завершено успішно. Захист хороший, але є що підсилити.", emoji: "🛡️" };
      if (currentScore >= 45) return { title: "Є прогрес", message: "База є, але частина рішень лишає вразливості.", emoji: "⚙️" };
      return { title: "Потрібне підсилення", message: "Захист поки слабкий. Варто пройти тест ще раз.", emoji: "🚨" };
    }

    function next() {
      step++;
      if (step >= db.length) {
        const result = getResultMeta(score);
        const success = score >= 70;

        if (success) {
          launchConfetti();
          playConfettiSfx();
        }

        document.getElementById("main-content").innerHTML = `
          <div style="text-align:center; padding:20px">
            <div class="finish-badge">Тест завершено</div>
            <h2 style="font-size:32px; margin-bottom:10px">${result.title}</h2>
            <div style="font-size:80px; margin:30px; filter: drop-shadow(0 0 20px var(--neon))">${result.emoji}</div>
            <p style="font-size:19px; font-weight:700; margin:0 0 10px 0;">
              ${success ? "✅ Тест завершено успішно." : "✅ Тест завершено."}
            </p>
            <p style="font-size:18px">Коефіцієнт захисту: <b style="color:var(--neon)">${score}%</b></p>
            <p style="color:#94a3b8; font-size:15px; margin-top:20px">${result.message}</p>
            <button class="action-btn" onclick="restartQuiz()" style="width:100%; margin-top:30px">Пройти тест ще раз</button>
          </div>
        `;
        updateHUD();
      } else {
        state = "theory";
        render();
        updateHUD();
      }
    }

    document.getElementById("music-toggle").addEventListener("click", toggleMusic);
    initMusicAutostart();
    updateHUD();
    render();
  </script>
</body>
</html>
